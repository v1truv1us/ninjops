---
title: Deploy Docs to GitHub Pages
description: Build and deploy the docs site to GitHub Pages with Astro and Starlight
---

name: Deploy Docs to GitHub Pages

description: Build and deploy the docs site to GitHub Pages with Astro and Starlight theme.

---

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

  concurrency:
    group: docs-${{ github.ref }}
    cancel-in-progress: true

  jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Install dependencies
        working-directory: ./docs-site
        run: bun install
        
      - name: Build with Astro
        working-directory: ./docs-site
        run: bun run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
